services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - api

  worker1:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --hostname=worker1@%h --concurrency=1
    depends_on:
      - redis

  worker2:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --hostname=worker2@%h --concurrency=1
    depends_on:
      - redis

  worker3:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --hostname=worker3@%h --concurrency=1
    depends_on:
      - redis

  worker4:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --hostname=worker4@%h --concurrency=1
    depends_on:
      - redis
